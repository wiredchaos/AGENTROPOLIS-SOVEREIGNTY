name: Sovereignty Control Plane

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sovereignty-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sovereignty:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run test:sovereignty
      - run: npm run validate:registry
      - run: npm run build
      - run: npm test

      - name: Scan full working tree for secrets
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          zricethezav/gitleaks:v8.28.0
          detect --no-git --redact --source /repo
